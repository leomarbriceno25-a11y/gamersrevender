{% extends 'base.html' %}
{% block title %}Registro - {{ tienda_nombre }}{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
        <h1>Crear Cuenta</h1>
        <p class="auth-subtitle">Regístrate como revendedor</p>
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nombre completo</label>
                <input type="text" name="nombre" placeholder="Tu nombre" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" name="email" placeholder="tucorreo@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Teléfono</label>
                <input type="text" name="telefono" placeholder="Tu teléfono (opcional)">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" name="password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-user-plus"></i> Crear Cuenta</button>
        </form>
        <p class="auth-link">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a></p>
    </div>
</section>
{% endblock %}

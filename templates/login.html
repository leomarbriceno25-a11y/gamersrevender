{% extends 'base.html' %}
{% block title %}Iniciar Sesión - {{ tienda_nombre }}{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-gamepad"></i></div>
        <h1>{{ tienda_nombre }}</h1>
        <p class="auth-subtitle">Inicia sesión para acceder a tu cuenta</p>
        <form method="POST">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                <input type="email" name="email" placeholder="tucorreo@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Contraseña</label>
                <input type="password" name="password" placeholder="Tu contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</button>
        </form>
        <p class="auth-link">¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate aquí</a></p>
    </div>
</section>
{% endblock %}
